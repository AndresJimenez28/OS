<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="css/formulario.css">
</head>

<body> 
    <h1>Prueba JavaScript</h1>

    <section>   
        <h2>1. Contar</h2>
        <input type="number" id="numeroContar" placeholder="Escribe un número">
        <button id="btnContar">Contar</button>
        <p id="resultadoContar"></p>
    </section>





    <section>   
        <h2>1. Sumar</h2>
        <input type="number" id="numeroSumar1" placeholder="Escribe un número">
        <input type="number" id="numeroSumar2" placeholder="Escribe un número">

        <button id="btnSumar">Sumar</button>
        <p id="resultadoSumar"></p>
    </section>


     <section>   
    <h2>1. Par o impar</h2>
    <input type="number" id="numeroPar" placeholder="Escribe un número">
    <button id="btnPar">Verificar</button>
    <p id="resultadoPar"></p>
    </section>

    





    <script src="js/prueba.js"></script>
</body>
</html>
